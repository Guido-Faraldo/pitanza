<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATEGORIAS - Pitanza</title>
    <link rel="icon" type="image/png" href="../IMAGENES/iconoConfiguracion.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styleForm.css">
    <link rel="stylesheet" href="stylePregSeg.css">
</head>
<body>
    <div class="fondo"></div>
    <a id="botonProductos" href="../PRODUCTOS/index.html">
        Ir a Productos
    </a>
    <p class="mensajeError" id="mensajeErrorCantidad"></p>
    <main>
        <h1>NUESTRAS CATEGORIAS:</h1>
        <table>
            <tbody>
            </tbody>
        </table>
        <button id="botonSumar">+</button>
    </main>
    <div class="overlay" id="overlay">
        <p class="mensajeError" id="mensajeErrorInput"></p>
        <div class="ventanaModal" id="formularioCategorias">
            <button id="botonCerrarModal">X</button>

            <h2>NUEVA CATEGORIA:</h2>

            <div class="campo">
                <label for="inputCategoria">Nombre:</label>
                <input type="text" id="inputCategoria">
            </div>

            <button id="botonGuardar">Guardar</button>
        </div>
    </div>
    <div class="overlaySeguridad" id="overlaySeguridad">
        <div class="ventanaModalSeguridad" id="ConsultaEliminacion">
            <p id="textoEliminacionCategoria"></p>
            <div class="botonesDecision">
                <button class="botonDecision" id="botonNo">No</button>
                <button class="botonDecision" id="botonSi">Si</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
